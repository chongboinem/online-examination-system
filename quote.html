<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lancelot&family=Silkscreen&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d5dcec;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            padding: 60px 40px;
            background-color: #f6f9fa;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #dbc3db;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: white;
            font-size: 36px;
            box-shadow: 0 8px 20px rgba(43, 48, 124, 0.3);
        }
        
        h1 {
            color: #3d428b;
            font-size: 2.2em;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 1.1em;
            color: #555;
            margin-bottom: 35px;
            line-height: 1.5;
        }
        
        .quote {
            font-family: "Silkscreen", monospace;
            font-size: 1.4em;
            color: #151054;
            margin: 30px 0 40px;
            padding: 15px 20px;
            background-color: rgba(43, 48, 124, 0.05);
            border-radius: 12px;
            border-left: 4px solid #cea4c2;
            border-right: 4px solid #cea4c2;

        }
        
        .start-exam-btn {
            font-family: 'Poppins', sans-serif;
            background-color: #c6c8e2;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 45px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(43, 48, 124, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .start-exam-btn:hover {
            background-color: #dbc3db;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(43, 48, 124, 0.4);
        }
        

        .btn-icon {
            font-size: 1.2em;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">⟡</div>
        <h1>Login Successful!</h1>
        <p class="subtitle">Take a deep breath and start.</p>
        <p class="quote">You got this!</p>
        <a href="exam.html">
            <button class="start-exam-btn">Start Exam </button>
        </a>
    </div>
</body>
</html>
